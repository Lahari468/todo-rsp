<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:#e9ddff;
        }

        .container{
            width:420px;
            background:#faf7ff;
            padding:35px;
            text-align:center;
            border-radius:15px;
            border:1px solid #d8c6f0;
            box-shadow:0 8px 20px rgba(0,0,0,0.12);
        }

        h2{
            color:#6a4c93;
            margin-bottom:25px;
        }

        .btn-group{
            display:flex;
            justify-content:center;
            gap:12px;
            margin-bottom:25px;
        }

        button{
            width:100px;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#b497d6;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#a37ccf;
        }

        .choices{
            min-height:40px;
            color:#555;
            font-size:16px;
            margin-bottom:15px;
            line-height:1.5;
        }

        #result{
            min-height:30px;
            color:#6a4c93;
            font-size:22px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Rock Paper Scissors</h2>

        <div class="btn-group">
            <button onclick="play('rock')">Rock</button>
            <button onclick="play('paper')">Paper</button>
            <button onclick="play('scissors')">Scissors</button>
        </div>

        <div class="choices" id="choices">
            Choose an option to start the game.
        </div>

        <h4 id="result"></h4>
    </div>

    <script>
        function play(user) {

            const choices = ["rock", "paper", "scissors"];
            const comp = choices[Math.floor(Math.random() * 3)];

            document.getElementById("choices").innerHTML =
                "You chose <strong>" + user +
                "</strong><br>Computer chose <strong>" + comp + "</strong>";

            if (user === comp) {
                document.getElementById("result").innerHTML = "Draw";
            }
            else if (
                (user === "rock" && comp === "scissors") ||
                (user === "paper" && comp === "rock") ||
                (user === "scissors" && comp === "paper")
            ) {
                document.getElementById("result").innerHTML = "You Win";
            }
            else {
                document.getElementById("result").innerHTML = "You Lose";
            }
        }
    </script>

</body>
</html>
